<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:      #000000;
      --bg-card:      #0F0F0F;
      --border:       rgba(229,9,20,0.2);
      --accent:       #E50914;
      --accent2:      #B91C1C;
      --accent3:      #FF4D4D;
      --accent-glow:  rgba(229,9,20,0.4);
      --accent2-glow: rgba(185,28,28,0.3);
      --wa-green:     #25d366;
      --text-primary: #FFFFFF;
      --text-muted:   #B0B0B0;
      --text-dim:     #5A5A5A;
      --radius-lg:    20px;
      --radius-xl:    32px;
      --font-d:       'Sora', sans-serif;
      --font-b:       'DM Sans', sans-serif;
      --ease:         cubic-bezier(0.4,0,0.2,1);
      --spring:       cubic-bezier(0.34,1.56,0.64,1);
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--font-b); background: var(--bg-deep); color: var(--text-primary); overflow-x: hidden; line-height: 1.65; }

    body::after {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    /* NAV */
    nav {
      position:fixed; top:0; left:0; right:0; z-index:200;
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 5%; background: rgba(0,0,0,0.7);
      backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
      border-bottom:1px solid var(--border); transition:background .4s var(--ease);
    }
    nav.scrolled { background: rgba(0,0,0,0.97); }

    .logo { font-family:var(--font-d); font-weight:800; font-size:1.45rem; letter-spacing:-0.5px; color:var(--text-primary); text-decoration:none; display:flex; align-items:center; gap:9px; }
    .logo-icon { width:32px; height:32px; background:var(--accent); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:0.85rem; color:#000; font-weight:800; }

    .nav-links { display:flex; gap:28px; list-style:none; align-items:center; }
    .nav-links a { color:var(--text-muted); text-decoration:none; font-size:.88rem; font-weight:500; transition:color .25s; }
    .nav-links a:hover { color:var(--accent); }
    .nav-cta { background:var(--accent) !important; color:#000 !important; font-weight:700 !important; padding:10px 22px !important; border-radius:50px; transition:all .3s var(--spring) !important; }
    .nav-cta:hover { transform:translateY(-2px) scale(1.04) !important; box-shadow:0 0 28px var(--accent-glow) !important; background:#ff2a2a !important; }

    .user-info { background:rgba(229,9,20,0.15); border-left:2px solid var(--accent); padding:5px 15px; border-radius:40px; font-size:.8rem; font-weight:600; display:flex; align-items:center; gap:12px; }
    .user-email { max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .logout-btn { background:var(--accent); border:none; color:#fff; padding:4px 12px; border-radius:30px; font-size:.7rem; font-weight:bold; cursor:pointer; transition:all .2s; }
    .logout-btn:hover { background:#ff2a2a; transform:scale(1.02); }

    /* HERO, SIMULADOR, etc. (mismo que antes) */
    .hero { min-height:80vh; display:flex; align-items:center; justify-content:center; padding:120px 5% 60px; position:relative; overflow:hidden; }
    .hero::before { content:''; position:absolute; inset:0; background-image: linear-gradient(rgba(229,9,20,.04) 1px,transparent 1px), linear-gradient(90deg,rgba(229,9,20,.04) 1px,transparent 1px); background-size:60px 60px; mask-image:radial-gradient(ellipse 70% 60% at 50% 50%,black 30%,transparent 100%); }
    .orb { position:absolute; border-radius:50%; filter:blur(90px); pointer-events:none; will-change:transform; }
    .orb-1 { width:700px;height:700px;opacity:.28; background:radial-gradient(circle,var(--accent) 0%,transparent 65%); top:-250px;left:-200px; animation:orb1 12s ease-in-out infinite; }
    .orb-2 { width:600px;height:600px;opacity:.22; background:radial-gradient(circle,var(--accent2) 0%,transparent 65%); bottom:-200px;right:-150px; animation:orb2 10s ease-in-out infinite; }
    @keyframes orb1 { 0%,100%{transform:translate(0,0) scale(1)} 40%{transform:translate(60px,-50px) scale(1.08)} 70%{transform:translate(-30px,30px) scale(.94)} }
    @keyframes orb2 { 0%,100%{transform:translate(0,0) scale(1)} 35%{transform:translate(-50px,40px) scale(1.06)} 65%{transform:translate(40px,-35px) scale(.96)} }

    .hero-inner { max-width:900px;width:100%; margin:0 auto; text-align:center; position:relative;z-index:1; }
    .hero-badge { display:inline-flex;align-items:center;gap:10px; background:rgba(229,9,20,.08); border:1px solid rgba(229,9,20,.28); border-radius:50px; padding:7px 18px; font-size:.78rem;font-weight:700;color:var(--accent); margin-bottom:26px; letter-spacing:.5px; animation:fadeUp .6s ease both; }
    .badge-dot { width:7px;height:7px;background:var(--accent);border-radius:50%; animation:pulseDot 2s ease-in-out infinite; }
    @keyframes pulseDot { 0%,100%{box-shadow:0 0 0 0 rgba(229,9,20,.5)} 50%{box-shadow:0 0 0 5px rgba(229,9,20,0)} }
    .hero-title { font-family:var(--font-d); font-size:clamp(2.5rem,5vw,3.9rem); font-weight:800; line-height:1.07; letter-spacing:-2px; margin-bottom:22px; animation:fadeUp .65s ease .1s both; }
    .gradient-text { background:linear-gradient(120deg,var(--accent) 0%,var(--accent2) 100%); -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
    .hero-subtitle { font-size:1.05rem;color:var(--text-muted);max-width:600px;margin:0 auto 22px;line-height:1.7; animation:fadeUp .65s ease .2s both; }
    .hours-badge { display:inline-flex;align-items:center;gap:9px; background:rgba(229,9,20,.08);border:1px solid rgba(229,9,20,.25); border-radius:10px;padding:11px 16px;margin-bottom:32px; font-size:.84rem;font-weight:500;color:var(--accent2); animation:fadeUp .65s ease .25s both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }

    .inv-simulator { padding:80px 5% 100px; background:linear-gradient(180deg,transparent 0%,rgba(15,15,15,0.8) 20%,rgba(15,15,15,0.8) 80%,transparent 100%); }
    .inv-card { background: linear-gradient(135deg, #0F0F0F 0%, #0A0A0A 50%, #0F0F0F 100%); border:1px solid rgba(229,9,20,0.2); border-radius:var(--radius-xl); padding:50px 50px 44px; box-shadow:0 30px 80px rgba(0,0,0,.7), 0 0 60px rgba(229,9,20,0.05); position:relative;overflow:hidden; }
    .inv-card::before { content:'';position:absolute;top:0;left:0;right:0;height:3px; background:linear-gradient(90deg,#E50914,#B91C1C,#E50914); border-radius:var(--radius-xl) var(--radius-xl) 0 0; background-size:200% 100%; animation:investGrad 3s linear infinite; }
    @keyframes investGrad { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }

    /* ... (el resto de estilos originales se mantienen iguales) ... */

    .whatsapp-float { position:fixed;bottom:28px;right:28px;z-index:300; width:64px;height:64px;border-radius:50%;border:none;cursor:pointer; display:flex;align-items:center;justify-content:center; background:linear-gradient(135deg,#25d366,#1aad54); box-shadow:0 6px 30px rgba(37,211,102,.55); animation:fadeInFloat 1s ease 2s both, floatWA 3s ease-in-out 3s infinite; }
    .whatsapp-float svg { width:32px;height:32px;fill:#fff; }
    @keyframes fadeInFloat { from{opacity:0;transform:scale(.4)} to{opacity:1;transform:scale(1)} }
    @keyframes floatWA { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

    /* =============================================
       MEJORA MÓVIL - Muy elegante en celulares
       ============================================= */
    @media (max-width: 480px) {
      body { font-size: 1rem; line-height: 1.7; }
      nav { padding: 14px 5%; }
      .hero { min-height: 85vh; padding: 100px 5% 40px; }
      .hero-title { font-size: clamp(2.3rem, 8vw, 3.2rem); letter-spacing: -1.5px; }
      .inv-simulator { padding: 60px 5% 80px; }
      .inv-card { padding: 35px 20px 30px; border-radius: 24px; }
      input[type="number"] { font-size: 1.4rem; padding: 18px 16px 18px 42px; }
      .btn-invest-wa { padding: 20px 25px; font-size: 1.1rem; }
      .whatsapp-float { width: 58px; height: 58px; bottom: 20px; right: 20px; box-shadow: 0 8px 25px rgba(37,211,102,.6); }
      .whatsapp-float svg { width: 30px; height: 30px; }
      .benefits, .how, .testimonials { padding: 70px 5%; }
      .benefit-card { padding: 28px 22px; }
      footer { padding: 50px 5% 30px; }
    }
    @media (max-width: 380px) {
      .hero-title { font-size: 2.4rem; }
      .inv-card { padding: 30px 18px 25px; }
    }
  </style>
</head>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "firebase/auth";
  import { getFirestore, doc, setDoc, getDoc, arrayUnion } from "firebase/firestore";

  const firebaseConfig = {
    apiKey: "AIzaSyD47LwjVajUEoa1SFY1zlN0RjgiqL025Wg",
    authDomain: "inversiones-aa.firebaseapp.com",
    projectId: "inversiones-aa",
    storageBucket: "inversiones-aa.firebasestorage.app",
    messagingSenderId: "661902970671",
    appId: "1:661902970671:web:3530f7fe1de2e32ff3dbda"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  const modal = document.getElementById('authModal');
  const userInfoArea = document.getElementById('userInfoArea');
  const userEmailSpan = document.getElementById('userEmailDisplay');
  const accountBtn = document.getElementById('accountBtn');
  const closeModalBtn = document.getElementById('closeModal');
  const googleBtn = document.getElementById('googleSignInBtn');
  const waFloat = document.querySelector('.whatsapp-float');

  const showModal = () => modal.style.display = 'flex';
  const hideModal = () => { modal.style.display = 'none'; clearAuthMsg(); };
  window.mostrarModal = showModal;

  function showAuthMsg(msg, type = 'error') {
    const el = document.getElementById('authMsg');
    el.textContent = msg; el.className = 'auth-msg ' + type; el.style.display = 'block';
  }
  function clearAuthMsg() {
    const el = document.getElementById('authMsg');
    el.style.display = 'none';
  }

  async function loadOrCreateUser(uid, email) {
    const ref = doc(db, "users", uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, { email, balance: 0, investments: [], createdAt: new Date() });
    }
  }

  async function saveInvestmentRequest(uid, data) {
    const ref = doc(db, "users", uid);
    await setDoc(ref, { investments: arrayUnion({ ...data, date: new Date().toISOString(), status: "pending" }) }, { merge: true });
  }

  onAuthStateChanged(auth, (user) => {
    if (user) {
      window._currentUser = user;
      userEmailSpan.textContent = user.email;
      userInfoArea.style.display = 'flex';
      accountBtn.style.display = 'none';
      if (waFloat) waFloat.style.display = 'flex';
      loadOrCreateUser(user.uid, user.email);
    } else {
      window._currentUser = null;
      userInfoArea.style.display = 'none';
      accountBtn.style.display = '';
      if (waFloat) waFloat.style.display = 'none';
    }
  });

  googleBtn.addEventListener('click', async () => {
    try { await signInWithPopup(auth, provider); hideModal(); }
    catch (e) { showAuthMsg("No se pudo iniciar sesión con Google."); }
  });

  // Email auth (mantengo tu código original)
  let isRegisterMode = false;
  window.toggleAuthMode = () => { /* tu código original */ };
  window.handleEmailAuth = async () => { /* tu código original */ };

  document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
  accountBtn.addEventListener('click', e => { e.preventDefault(); window._currentUser ? alert(`Sesión activa: ${window._currentUser.email}`) : showModal(); });
  closeModalBtn.addEventListener('click', hideModal);

  window._fmt = v => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0,maximumFractionDigits:0}).format(v);
</script>

<!-- ===== SIMULADOR (con protección de WhatsApp) ===== -->
<script>
  window._WHATSAPP_NUMBER = '573052131345';
  window._currentUser = null;
  window._invResultadoActual = null;
  let invTasa = 7.5;

  function fmt(v) { return (window._fmt || (n => '$' + Math.round(n).toLocaleString('es-CO')))(v); }

  const invMontoInput = document.getElementById('inv-monto');
  const invMontoSlider = document.getElementById('inv-monto-slider');
  const invTasaSlider = document.getElementById('inv-tasa-slider');
  const loginNotice = document.getElementById('loginNotice');

  window.actualizarTasaDisplay = function(v) {
    invTasa = parseFloat(v);
    document.getElementById('inv-tasa-val').textContent = invTasa + '%';
    document.getElementById('inv-tasa-display').textContent = invTasa + '%';
    invTasaSlider.style.setProperty('--fill', ((invTasa - 5) / 5 * 100) + '%');
    calcularInversion();
  };

  window.setTasa = function(v) {
    invTasaSlider.value = v;
    actualizarTasaDisplay(v);
  };

  window.abrirWhatsAppGeneral = function() {
    if (!window._currentUser) { window.mostrarModal(); return; }
    const msg = `Hola A&A! 👋 Me interesa obtener información sobre sus inversiones. ¿Me pueden ayudar?`;
    window.open(`https://wa.me/${window._WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
  };

  window.solicitarInversion = async function() {
    const resultado = window._invResultadoActual;
    if (!resultado) return;
    if (!window._currentUser) { window.mostrarModal(); return; }

    const { capital, ganancia, total, tasa } = resultado;
    try {
      await saveInvestmentRequest(window._currentUser.uid, { amount: capital, profit: ganancia, total, rate: tasa });
    } catch(e) { console.error("Error guardando inversión:", e); }

    const f = v => new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(v);
    const msg = `Hola A&A! 👋 Me interesa invertir:\n\n💰 *Capital:* ${f(capital)}\n📈 *Tasa:* ${tasa}% mensual\n🏆 *Ganancia:* ${f(Math.round(ganancia))}\n✅ *Total:* ${f(Math.round(total))}\n\n¿Me dan más información? 🙏`;
    window.open(`https://wa.me/${window._WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
  };

  // Resto del simulador (igual que antes)
  invMontoInput.addEventListener('input', () => { const v = Math.min(Math.max(Number(invMontoInput.value), 100000), 10000000); invMontoSlider.value = v; calcularInversion(); });
  invMontoSlider.addEventListener('input', () => { invMontoInput.value = invMontoSlider.value; calcularInversion(); });
  invTasaSlider.addEventListener('input', () => actualizarTasaDisplay(invTasaSlider.value));

  function calcularInversion() {
    const capital = parseFloat(invMontoInput.value) || 0;
    if (capital < 100000) return;
    const ganancia = capital * (invTasa / 100);
    const total = capital + ganancia;
    window._invResultadoActual = { capital, ganancia, total, tasa: invTasa };
    animarValor('inv-r-capital', capital);
    animarValor('inv-r-ganancia', ganancia);
    animarValor('inv-r-total', total);
    if (!window._currentUser) loginNotice.style.display = 'flex';
  }

  function animarValor(id, final) {
    const el = document.getElementById(id);
    const dur = 550, t0 = Date.now();
    (function tick() {
      const p = Math.min((Date.now()-t0)/dur, 1);
      el.textContent = fmt(Math.round(final * (1-Math.pow(1-p,3))));
      if (p < 1) requestAnimationFrame(tick);
    })();
  }

  // Init
  window.addEventListener('DOMContentLoaded', () => {
    invMontoInput.value = 500000;
    invMontoSlider.value = 500000;
    actualizarTasaDisplay(7.5);
    calcularInversion();
  });

  // Navbar scroll y demás scripts que ya tenías
  window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40));
</script>
